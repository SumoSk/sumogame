<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Traffic Fixer Thailand - Prototype</title>
  <style>
:root {
  --bg: #0b1820;
  --panel: rgba(248, 250, 252, 0.92);
  --panel-strong: rgba(255, 255, 255, 0.96);
  --line: rgba(15, 23, 42, 0.12);
  --text: #14212b;
  --muted: #64748b;
  --accent: #f59e0b;
  --accent2: #0284c7;
  --good: #16a34a;
  --bad: #dc2626;
  --warn: #ea580c;
  --dark-panel: rgba(10, 19, 26, 0.76);
}
* { box-sizing: border-box; text-shadow: none !important; }
.brand .logo, .tool .tool-icon, .panel-title:before, .dot { box-shadow: none !important; filter: none !important; }
html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, sans-serif;
  background: radial-gradient(circle at 45% 10%, rgba(125, 211, 252, .20), transparent 28%), var(--bg);
  color: var(--text);
}
canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: default;
  background: #b9d8aa;
}
canvas.dragging { cursor: grabbing; }
#topbar, #bottombar, .panel, .map-legend {
  position: absolute;
  z-index: 5;
  backdrop-filter: blur(18px) saturate(1.08);
}
#topbar {
  left: 14px;
  right: 14px;
  top: 12px;
  min-height: 72px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border: 1px solid rgba(255,255,255,.62);
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(236,244,250,.86));
  box-shadow: 0 16px 48px rgba(15, 23, 42, .20), inset 0 1px 0 rgba(255,255,255,.88);
}
.brand { display: flex; align-items: center; gap: 10px; min-width: 245px; }
.brand .logo {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  font-size: 25px;
  border-radius: 16px;
  background: linear-gradient(135deg, #fbbf24, #fb923c);
}
.brand strong { font-size: 15px; letter-spacing: .15px; color: #0f172a; }
.brand small { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
.stats {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(6, minmax(96px, 1fr));
  gap: 7px;
  font-size: 12px;
}
.stat {
  position: relative;
  overflow: hidden;
  min-height: 49px;
  padding: 7px 9px;
  border-radius: 15px;
  background: rgba(255,255,255,.74);
  border: 1px solid rgba(15, 23, 42, .08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.90);
}
.stat .label { display: flex; align-items: center; gap: 5px; color: var(--muted); white-space: nowrap; }
.stat b { display: block; color: #0f172a; font-size: 15px; line-height: 1.1; margin-top: 4px; letter-spacing: .1px; }
.stat.good b { color: var(--good); }
.stat.warn b { color: var(--warn); }
.stat.bad b { color: var(--bad); }
.stat.clock { background: linear-gradient(135deg, #0f172a, #1e293b); }
.stat.clock .label, .stat.clock b { color: #fff; }
.stat.clickable { cursor: pointer; }
.stat.clickable:hover { border-color: rgba(2,132,199,.40); background: #ffffff; }
.stat.clickable:after { content: "ดูรายละเอียด"; position: absolute; right: 8px; bottom: 5px; font-size: 9px; color: #64748b; opacity: .75; }
.breakdown-list { display: grid; gap: 7px; margin-top: 9px; }
.breakdown-row { padding: 8px; border-radius: 12px; background: rgba(241,245,249,.86); border: 1px solid rgba(15,23,42,.06); }
.breakdown-row b { display:flex; justify-content:space-between; gap:8px; margin-bottom:4px; }
.bar-track { height: 8px; border-radius: 99px; overflow: hidden; background: rgba(15,23,42,.10); }
.bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #38bdf8, #22c55e); }
.vacancy-list { margin-top: 8px; display:grid; gap:6px; }
.vacancy-item { padding: 7px 8px; border-radius: 11px; background: rgba(255,255,255,.72); border:1px solid rgba(15,23,42,.07); }

.top-actions { display: flex; align-items: center; gap: 8px; }
.city-picker {
  display: grid;
  gap: 3px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
button, select {
  color: #0f172a;
  background: rgba(255,255,255,.88);
  border: 1px solid rgba(15,23,42,.14);
  border-radius: 13px;
  padding: 8px 11px;
  font-size: 13px;
  outline: none;
  box-shadow: 0 1px 0 rgba(255,255,255,.76), 0 8px 18px rgba(15,23,42,.06);
}
button { cursor: pointer; transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease; }
button:hover, select:hover { border-color: rgba(2,132,199,.38); background: #fff; box-shadow: 0 10px 24px rgba(2,132,199,.12); }
button:active { transform: translateY(1px); }
button.active {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #221407;
  border-color: rgba(245,158,11,.74);
  font-weight: 900;
}
.danger-lite { color: #991b1b; }
.panel {
  top: 96px;
  bottom: 66px;
  width: 318px;
  border: 1px solid rgba(255,255,255,.64);
  border-radius: 22px;
  background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(242,248,252,.88));
  padding: 12px;
  overflow: auto;
  box-shadow: 0 18px 56px rgba(15,23,42,.22), inset 0 1px 0 rgba(255,255,255,.9);
  scrollbar-color: rgba(15,23,42,.22) transparent;
}
.panel.left { left: 14px; }
.panel.right { right: 14px; }
.panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.panel-title { font-weight: 950; letter-spacing: .18px; color: #0f172a; font-size: 16px; }
.panel-title:before {
  content: "";
  display: inline-block;
  width: 8px;
  height: 8px;
  margin-right: 7px;
  border-radius: 99px;
  background: var(--accent);
}
.panel-subtitle { color: #92400e; font-weight: 900; margin: 14px 0 8px; }
.hint { color: var(--muted); font-size: 12px; line-height: 1.42; margin-top: 2px; }
.tool-tabs {
  position: sticky;
  top: -12px;
  z-index: 3;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 9px 0 9px;
  margin-bottom: 4px;
  background: linear-gradient(180deg, rgba(248,250,252,.97), rgba(248,250,252,.82));
}
.tool-tab {
  flex: 0 0 auto;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  color: #475569;
  background: rgba(255,255,255,.76);
}
.tool-tab.active { background: #0f172a; color: #fff; border-color: #0f172a; }
.tool-group { margin: 9px 0 14px; }
.tool-group.is-hidden { display: none; }
.tool-group h3 { margin: 0 0 7px; font-size: 13px; color: #334155; display: flex; align-items: center; gap: 6px; }
.tool-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
.tool {
  text-align: left;
  min-height: 64px;
  padding: 9px 10px;
  border-radius: 16px;
  background: rgba(255,255,255,.76);
  border: 1px solid rgba(15,23,42,.09);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 18px rgba(15,23,42,.045);
}
.tool strong { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #0f172a; }
.tool .tool-icon { width: 24px; height: 24px; display: inline-grid; place-items: center; border-radius: 9px; background: #e0f2fe; font-size: 14px; }
.tool small { color: var(--muted); display: block; margin-top: 5px; padding-left: 32px; font-size: 11px; line-height: 1.32; }
.tool.active {
  background: linear-gradient(135deg, rgba(255,237,184,.94), rgba(255,247,237,.96));
  border-color: rgba(245,158,11,.72);
  box-shadow: 0 0 0 2px rgba(245,158,11,.13), 0 12px 26px rgba(245,158,11,.14);
}
.tool.disabled { opacity: .48; filter: grayscale(.18); }
.card {
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(15,23,42,.09);
  border-radius: 17px;
  padding: 12px;
  font-size: 13px;
  line-height: 1.55;
  margin-bottom: 10px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.9), 0 8px 18px rgba(15,23,42,.045);
}
.card b, .inspector-title { color: #0f172a; font-weight: 950; }
.card .muted, .muted { color: var(--muted); }
.inspector-card .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 8px; }
.metric {
  padding: 8px;
  border-radius: 12px;
  background: rgba(241,245,249,.86);
  border: 1px solid rgba(15,23,42,.06);
}
.metric span { display: block; color: var(--muted); font-size: 11px; }
.metric b { display: block; margin-top: 2px; font-size: 13px; }
.alert {
  background: linear-gradient(180deg, rgba(254,226,226,.92), rgba(255,247,237,.78));
  border: 1px solid rgba(220,38,38,.22);
  border-radius: 16px;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.45;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
}
.alert.good { background: linear-gradient(180deg, rgba(220,252,231,.92), rgba(240,253,244,.78)); border-color: rgba(22,163,74,.25); }
.alert b { display: block; margin-bottom: 3px; color: #0f172a; }
.map-legend {
  left: 50%;
  bottom: 74px;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 11px;
  border-radius: 999px;
  background: rgba(15,23,42,.64);
  border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.82);
  font-size: 12px;
  box-shadow: 0 12px 32px rgba(15,23,42,.22);
}
.dot { width: 10px; height: 10px; display: inline-block; border-radius: 99px; margin-right: 5px; vertical-align: -1px; }
.dot.road { background: #5b6670; }
.dot.gate { background: #fbbf24; }
.dot.vehicle { background: #38bdf8; }
.dot.heat { background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444); width: 26px; border-radius: 999px; }
#bottombar {
  left: 14px;
  right: 14px;
  bottom: 12px;
  min-height: 48px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid rgba(255,255,255,.64);
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(236,244,250,.88));
  box-shadow: 0 16px 48px rgba(15,23,42,.18), inset 0 1px 0 rgba(255,255,255,.88);
}
.speed-group { display: flex; gap: 6px; padding: 4px; border-radius: 16px; background: rgba(15,23,42,.05); }
.wide-btn { min-width: 142px; }
#statusText {
  margin-left: auto;
  color: #334155;
  font-size: 12px;
  white-space: nowrap;
  max-width: 33vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
@media (max-width: 1320px) {
  .stats { grid-template-columns: repeat(4, minmax(90px, 1fr)); }
  .panel { width: 296px; }
  .brand { min-width: 205px; }
}
@media (max-width: 1000px) {
  .panel.right { display: none; }
  .stats { grid-template-columns: repeat(3, minmax(80px, 1fr)); }
  .map-legend { display: none; }
}
@media (max-width: 820px) {
  .panel.left { display: none; }
  .brand { min-width: 155px; }
  .brand small { display: none; }
  .stats { grid-template-columns: repeat(2, minmax(80px, 1fr)); }
  #statusText { display: none; }
}

/* User readability pass: flat text/icons, no visual shadows. */
* { text-shadow: none !important; }
#topbar, #bottombar, .panel, .map-legend, .stat, .tool, .card, .metric, .alert,
button, select, .breakdown-row, .vacancy-item, .brand .logo, .tool .tool-icon, .dot {
  box-shadow: none !important;
  filter: none !important;
}
#topbar, #bottombar, .panel {
  backdrop-filter: none !important;
}
.stat .label, .tool strong, .tool small, .metric span, .metric b, .inspector-title, .muted,
.panel-title, .panel-subtitle, button, select {
  text-shadow: none !important;
}
/* iPad compact HUD pass: keep the top bar small on touch/tablet screens. */
@media (pointer: coarse), (max-width: 1180px) {
  #topbar {
    left: 8px;
    right: 8px;
    top: max(6px, env(safe-area-inset-top));
    min-height: 50px;
    gap: 6px;
    padding: 6px 8px;
    border-radius: 14px;
    align-items: center;
  }
  .brand {
    min-width: 122px;
    gap: 6px;
  }
  .brand .logo {
    width: 30px;
    height: 30px;
    min-width: 30px;
    font-size: 17px;
    border-radius: 9px;
  }
  .brand strong {
    font-size: 11px;
    line-height: 1.05;
  }
  .brand small {
    display: none !important;
  }
  .stats {
    grid-template-columns: repeat(6, minmax(54px, 1fr)) !important;
    gap: 4px;
    font-size: 9px;
    min-width: 0;
  }
  .stat {
    min-height: 34px;
    padding: 4px 5px;
    border-radius: 10px;
  }
  .stat .label {
    font-size: 8.5px;
    gap: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat b {
    font-size: 11px;
    line-height: 1.05;
    margin-top: 2px;
    white-space: nowrap;
  }
  .stat.clickable:after {
    display: none;
  }
  .top-actions {
    gap: 4px;
    flex: 0 0 auto;
  }
  button, select {
    padding: 5px 7px;
    border-radius: 10px;
    font-size: 11px;
  }
  .panel {
    top: calc(max(6px, env(safe-area-inset-top)) + 58px);
    bottom: 54px;
  }
  #bottombar {
    left: 8px;
    right: 8px;
    bottom: max(6px, env(safe-area-inset-bottom));
    min-height: 40px;
    gap: 5px;
    padding: 5px 7px;
    border-radius: 14px;
    overflow-x: auto;
  }
  #bottombar button {
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .map-legend {
    bottom: calc(max(6px, env(safe-area-inset-bottom)) + 48px);
  }
}

@media (pointer: coarse) and (max-width: 820px) {
  .brand {
    display: none;
  }
  .stats {
    grid-template-columns: repeat(6, minmax(46px, 1fr)) !important;
  }
  .top-actions select {
    max-width: 78px;
  }
  #resetBtn {
    max-width: 76px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
}

@media (pointer: coarse) and (max-width: 680px) {
  .stats {
    grid-template-columns: repeat(3, minmax(58px, 1fr)) !important;
  }
  #topbar {
    align-items: flex-start;
  }
}

/* iPad two-finger navigation + collapsible HUD pass */
canvas { touch-action: none; }
.collapse-btn {
  flex: 0 0 auto;
  width: 30px;
  height: 30px;
  min-width: 30px;
  padding: 0 !important;
  display: grid;
  place-items: center;
  border-radius: 10px;
  font-weight: 950;
  line-height: 1;
  background: #ffffff !important;
  color: #0f172a !important;
  border: 1px solid rgba(15,23,42,.18) !important;
  box-shadow: none !important;
}
.panel { padding-top: 44px; }
.panel > .collapse-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 30;
}
#topbar.collapsed, #bottombar.collapsed, .panel.collapsed {
  width: 42px !important;
  height: 42px !important;
  min-width: 42px !important;
  min-height: 42px !important;
  max-width: 42px !important;
  max-height: 42px !important;
  right: auto !important;
  bottom: auto !important;
  padding: 6px !important;
  overflow: visible !important;
  border-radius: 14px !important;
  display: block !important;
  background: rgba(255,255,255,.96) !important;
}
#topbar.collapsed { left: 8px !important; top: max(6px, env(safe-area-inset-top)) !important; }
#bottombar.collapsed { left: 8px !important; bottom: max(6px, env(safe-area-inset-bottom)) !important; top: auto !important; }
.panel.left.collapsed { left: 8px !important; top: calc(max(6px, env(safe-area-inset-top)) + 52px) !important; }
.panel.right.collapsed { right: 8px !important; left: auto !important; top: calc(max(6px, env(safe-area-inset-top)) + 102px) !important; }
#topbar.collapsed > :not(.collapse-btn),
#bottombar.collapsed > :not(.collapse-btn),
.panel.collapsed > :not(.collapse-btn) {
  display: none !important;
}
#topbar.collapsed > .collapse-btn,
#bottombar.collapsed > .collapse-btn,
.panel.collapsed > .collapse-btn {
  position: static !important;
  width: 30px !important;
  height: 30px !important;
  min-width: 30px !important;
}
.demand-row.bad-demand { background: rgba(255,247,237,.92); border-color: rgba(234,88,12,.22); }
.demand-row.good-demand { background: rgba(240,253,244,.88); border-color: rgba(22,163,74,.18); }

@media (max-width: 1000px) {
  .panel.right { display: block; }
}
@media (pointer: coarse), (max-width: 1180px) {
  .stats { grid-template-columns: repeat(7, minmax(48px, 1fr)) !important; }
  .panel { width: min(300px, calc(100vw - 18px)); }
  .panel.right { right: 8px; }
  .panel.left { left: 8px; }
  #topbar:not(.collapsed) { padding-left: 7px; }
  #bottombar:not(.collapsed) { padding-left: 7px; }
}
@media (pointer: coarse) and (max-width: 680px) {
  .stats { grid-template-columns: repeat(4, minmax(54px, 1fr)) !important; }
}

/* Final flat readability: remove every UI shadow/filter/text shadow. */
* {
  text-shadow: none !important;
  box-shadow: none !important;
  filter: none !important;
}
#topbar, #bottombar, .panel, .stat, .tool, .card, .metric, .alert, .map-legend, .collapse-btn, button, select {
  box-shadow: none !important;
  text-shadow: none !important;
  filter: none !important;
}
.tool-icon, .logo, .dot, .brand, .panel-title, .panel-subtitle, .inspector-title {
  box-shadow: none !important;
  text-shadow: none !important;
  filter: none !important;
}


/* iPad portrait fix: allow the collapsed tool panels to open.
   Earlier mobile CSS hid .panel.left at <=820px; when tapping + to expand,
   the panel lost .collapsed and became display:none, so users could not select tools. */
@media (pointer: coarse), (max-width: 820px) {
  .panel.left:not(.collapsed),
  .panel.right:not(.collapsed) {
    display: block !important;
  }
}



/* iPad Safari navigation lock + small map joystick */
html, body {
  position: fixed;
  overflow: hidden !important;
  overscroll-behavior: none;
  width: 100%;
  height: 100%;
}
body, #app, canvas {
  touch-action: none !important;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#mapJoy {
  position: absolute;
  z-index: 20;
  left: 50%;
  bottom: calc(max(8px, env(safe-area-inset-bottom)) + 58px);
  transform: translateX(-50%);
  display: none;
  grid-template-columns: 34px 34px 34px;
  grid-template-rows: 34px 34px 34px;
  gap: 3px;
  padding: 5px;
  border-radius: 18px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(15,23,42,.12);
  pointer-events: auto;
  touch-action: none !important;
}
#mapJoy button {
  width: 34px;
  height: 34px;
  min-width: 34px;
  padding: 0 !important;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 16px;
  font-weight: 950;
  background: rgba(255,255,255,.96);
  border: 1px solid rgba(15,23,42,.16);
  touch-action: none !important;
  -webkit-user-select: none;
  user-select: none;
}
#mapJoy .joy-up { grid-column: 2; grid-row: 1; }
#mapJoy .joy-left { grid-column: 1; grid-row: 2; }
#mapJoy .joy-mid { grid-column: 2; grid-row: 2; opacity: .55; font-size: 13px; }
#mapJoy .joy-right { grid-column: 3; grid-row: 2; }
#mapJoy .joy-down { grid-column: 2; grid-row: 3; }
@media (pointer: coarse), (max-width: 1180px) {
  #mapJoy { display: grid; }
}
@media (pointer: coarse) and (max-width: 680px) {
  #mapJoy {
    bottom: calc(max(8px, env(safe-area-inset-bottom)) + 52px);
    transform: translateX(-50%) scale(.92);
  }
}

</style>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="mapJoy" aria-label="ปุ่มเลื่อนแผนที่">
      <button class="joy-up" data-pan="up" aria-label="เลื่อนขึ้น">▲</button>
      <button class="joy-left" data-pan="left" aria-label="เลื่อนซ้าย">◀</button>
      <button class="joy-mid" aria-label="เลื่อนแผนที่" disabled>✥</button>
      <button class="joy-right" data-pan="right" aria-label="เลื่อนขวา">▶</button>
      <button class="joy-down" data-pan="down" aria-label="เลื่อนลง">▼</button>
    </div>


    <header id="topbar">
      <button class="collapse-btn" data-collapse-target="topbar" aria-label="ย่อ/ขยายแถบบน">−</button>
      <div class="brand">
        <span class="logo">🚦</span>
        <div>
          <strong>Traffic Fixer Thailand</strong>
          <small>Playable Prototype v0.3 iPad Nav Fix</small>
        </div>
      </div>

  function makeProfiles() {
    const profiles = [];
    // ปรับใหม่ตามฟีดแบ็ก: ใช้ 4 กลุ่มหลักเท่ากัน 25% และสุ่มแจกตอน Citizen เกิด
    // เพื่อให้เมืองมีรถหลายช่วงเวลา ไม่เงียบจนรอแค่เข้างาน/ออกงาน
    const traitPool = [
      ...Array(25).fill('ขยัน'),
      ...Array(25).fill('ชิล ๆ'),
      ...Array(25).fill('สายชิล'),
      ...Array(25).fill('บ้านรวย')
    ];
    for (let i = 0; i < 100; i++) {
      const trait = traitPool[i];
      const baseLeave = 6 * 60 + 10 + (i * 13) % 220;
      const workEnd = 17 * 60 + 10 + (i * 19) % 120;
      const leisureKind = trait === 'ขยัน'
        ? ['restaurant', null, 'park', null][i % 4]
        : trait === 'ชิล ๆ'
          ? ['restaurant', 'mall', 'shop', 'park'][i % 4]
          : trait === 'สายชิล'
            ? ['restaurant', 'mall', 'pub', 'park'][i % 4]
            : ['mall', 'restaurant', 'pub', 'shop'][i % 4];
      profiles.push({
        id: i + 1,
        trait,
        tax: 1000,
        workDays: trait === 'บ้านรวย' ? [] : trait === 'สายชิล' ? [0,1,2,3] : [0,1,2,3,4],
        leaveWorkAt: baseLeave,
        workStartDeadline: 10 * 60 + 30,
        workEndAt: workEnd,
        afterWork: leisureKind,
        afterWorkStart: workEnd + 10 + (i * 11) % 55,
        afterWorkEnd: leisureKind === 'pub' ? 23 * 60 + 30 : 21 * 60 + (i % 4) * 20,
        weekendKind: trait === 'ขยัน' ? ['park', null, 'restaurant', null][i % 4] : ['mall','park','restaurant','pub'][i % 4],

        weekendEnd: 16 * 60 + (i * 5) % 210,
        richStart: 14 * 60 + (i % 6) * 25,
        richEnd: 27 * 60
      });
    }
    return profiles;
  }

  function kpiState(value, goodAt, badAt, inverse = false) {

  function absAt(day, minute) { return day * 1440 + minute; }

  function roadDataById(id) { return ROAD_BY_ID[id] || null; }
  function getRoadRatio(i) {
    const t = road[i];
    if (!t) return 0;
    const rd = roadDataById(t);
    const cap = Math.max(1, laneCapacityAt(i));
    const density = cellVehicleCount(i) / cap;
    // ใช้ density เป็นตัวหลัก เพื่อให้รถเต็ม Grid แล้วเกิดแดง/ดำจริง
    // flowLoad = รถผ่านเยอะ, waitLoad = รถรอไฟ/รอคิว ทำให้คอขวดติดสะสม
    const flowPressure = flowLoad[i] / Math.max(1, rd.capacity) * 0.55;
    const waitPressure = waitLoad[i] * 1.35;
    return density * 1.28 + flowPressure + waitPressure;
  }
  function trafficColor(ratio) {
    if (ratio <= 0.60) return '#34d174';
    if (ratio <= 0.90) return '#f6d45d';

    return '#111111';
  }

  function roadLaneCountAt(i) {
    const rd = roadDataById(road[i]);
    return rd ? rd.lanes : 0;
  }
  function laneCapacityAt(i) {
    const lanes = roadLaneCountAt(i);
    if (!lanes) return 0;
    // 2 เลน = 3 คัน/กริด, 4 เลน = 6 คัน/กริด, 8 เลน = 12 คัน/กริด
    // เดิมคูณต่อเลนจนถนนจุ 6/12/24 ทำให้ไม่ค่อยเกิดรถติด
    return Math.max(CARS_PER_GRID, Math.round((lanes / 2) * CARS_PER_GRID));
  }
  function laneCapacityAtPreview(lanes) {
    return Math.max(CARS_PER_GRID, Math.round((lanes / 2) * CARS_PER_GRID));
  }
  function lanesPerDirectionAt(i) {
    return Math.max(1, Math.floor(roadLaneCountAt(i) / 2));
  }
  function directionCapacityAt(i) {
    if (!road[i]) return 0;
    return Math.max(1, Math.ceil(laneCapacityAt(i) / 2));
  }
  function moveDirKey(from, to) {
    if (from == null || to == null || from === to) return 'idle';
    const a = xy(from), b = xy(to);
    return `${sign(b.x - a.x)},${sign(b.y - a.y)}`;
  }
  function parseDirKey(dirKey) {
    const parts = String(dirKey || '0,0').split(',').map(n => Number(n) || 0);
    return { dx: parts[0] || 0, dy: parts[1] || 0 };
  }
  function neighborByDir(baseIdx, dirKey) {
    const { dx, dy } = parseDirKey(dirKey);
    const p = xy(baseIdx);
    const nx = p.x + dx, ny = p.y + dy;
    return inBounds(nx, ny) ? idx(nx, ny) : null;
  }
  function hasRoadLink(a, b) {
    const set = roadLinks.get(a);
    return !!(set && set.has(b) && road[a] && road[b]);
  }
  function approachPredecessorForBuilding(b) {
    if (!b || b.entrance == null || !b.entryDirKey) return null;
    const { dx, dy } = parseDirKey(b.entryDirKey);
    const p = xy(b.entrance);
    const px = p.x - dx, py = p.y - dy;
    if (!inBounds(px, py)) return null;
    const pre = idx(px, py);
    return hasRoadLink(pre, b.entrance) ? pre : null;
  }
  function allBuildingApproachPredecessors(b) {
    if (!b || b.entrance == null) return [];
    const out = [];
    const links = roadLinks.get(b.entrance);
    if (links) {
      for (const ni of links) if (road[ni] && hasRoadLink(ni, b.entrance)) out.push(ni);
    }
    const preferred = approachPredecessorForBuilding(b);
    if (preferred != null && out.includes(preferred)) {
      out.splice(out.indexOf(preferred), 1);
      out.unshift(preferred);
    }
    return out;
  }
  function exitSuccessorForBuilding(b) {
    if (!b || b.entrance == null || !b.entryDirKey) return null;
    const post = neighborByDir(b.entrance, b.entryDirKey);
    return post != null && hasRoadLink(b.entrance, post) ? post : null;
  }
  function constrainedPathForTrip(opts) {
    if (opts.prePath) return opts.prePath;
    let start = opts.fromIdx;
    let goal = opts.toIdx;
    let prefix = [];
    let appendGoal = false;
    const fromB = opts.fromBuildingId ? buildingById(opts.fromBuildingId) : null;
    if (fromB && fromB.entrance === start && fromB.entryDirKey) {
      const post = exitSuccessorForBuilding(fromB);
      if (post != null && post !== start) { prefix = [start]; start = post; }
    }
    const destB = opts.destBuildingId ? buildingById(opts.destBuildingId) : null;
    if (destB && destB.entrance === goal) {
      // อาคารใช้ entrance บนถนนเป็น drop-off node: รถถึงช่องถนนที่ติดอาคารแล้วถือว่าเข้าอาคารสำเร็จ
      // ไม่บังคับให้ต้องวน/กลับรถเพื่อเข้าจากทิศเดียว เพราะบน iPad และถนนปลายตันทำให้รถค้างหน้าอาคารได้ง่าย
      const direct = findPath(start, goal, true, { allowDeadEndUTurn: true });
      if (direct.length) return prefix.length ? prefix.concat(direct) : direct;
      const candidates = allBuildingApproachPredecessors(destB);
      for (const pre of candidates) {
        const midTry = findPath(start, pre, true, { allowDeadEndUTurn: true });
        if (midTry.length) {
          const path = prefix.length ? prefix.concat(midTry) : midTry;
          if (path[path.length - 1] !== opts.toIdx && hasRoadLink(path[path.length - 1], opts.toIdx)) path.push(opts.toIdx);
          return path;
        }
      }
      appendGoal = false;
    }
    const mid = findPath(start, goal, false, { allowDeadEndUTurn: true });
    if (!mid.length) return [];
    let path = prefix.length ? prefix.concat(mid) : mid;
    if (appendGoal && path[path.length - 1] !== opts.toIdx) path.push(opts.toIdx);
    return path;
  }
  function laneBucketMap(i, create = false) {
    let buckets = laneMap.get(i);
    if (!buckets && create) { buckets = new Map(); laneMap.set(i, buckets); }
    return buckets || null;
  }
  function vehicleExistsInCell(i, vehicleId) {
    const buckets = laneBucketMap(i, false);
    if (!buckets || vehicleId <= 0) return false;
    for (const set of buckets.values()) if (set.has(vehicleId)) return true;
    return false;
  }
  function cellVehicleCount(i) {
    const buckets = laneBucketMap(i, false);
    if (!buckets) return 0;
    let n = 0;
    for (const set of buckets.values()) n += set.size;
    return n;
  }
  function allVehicleIdsInCell(i) {
    const buckets = laneBucketMap(i, false);
    if (!buckets) return [];
    const ids = [];
    for (const set of buckets.values()) ids.push(...set);
    return ids;
  }
  function canEnterCell(i, vehicleId, dirKey = null) {
    if (!road[i]) return false;
    if (vehicleExistsInCell(i, vehicleId)) return true;
    const total = cellVehicleCount(i);
    if (total >= laneCapacityAt(i)) return false;
    if (!dirKey) return true;
    const buckets = laneBucketMap(i, false);
    const set = buckets && buckets.get(dirKey);
    return !set || set.size < directionCapacityAt(i);
  }
  function occupyCell(i, vehicleId, dirKey = 'idle') {
    if (!road[i]) return false;
    if (vehicleExistsInCell(i, vehicleId)) return true;
    if (!canEnterCell(i, vehicleId, dirKey)) return false;
    const buckets = laneBucketMap(i, true);
    let set = buckets.get(dirKey);
    if (!set) { set = new Set(); buckets.set(dirKey, set); }
    set.add(vehicleId);
    occ[i] = allVehicleIdsInCell(i)[0] || 0;
    return true;
  }
  function releaseCell(i, vehicleId) {
    const buckets = laneBucketMap(i, false);
    if (!buckets) { occ[i] = 0; return; }
    for (const [key, set] of buckets.entries()) {
      set.delete(vehicleId);
      if (!set.size) buckets.delete(key);
    }
    if (!buckets.size) { laneMap.delete(i); occ[i] = 0; }
    else occ[i] = allVehicleIdsInCell(i)[0] || 0;
  }
  function clearNextCell(v) {
    if (v.nextIdx != null) {
      releaseCell(v.nextIdx, v.id);
      v.nextIdx = null;
      v.t = 0;
    }
  }

  function ensureRoadLinkSet(i) {
    let set = roadLinks.get(i);
    if (!set) { set = new Set(); roadLinks.set(i, set); }
    return set;
  }
  function addRoadLink(a, b) {
    if (a === b || !road[a] || !road[b]) return false;
    const ax = a % MAP_W, ay = Math.floor(a / MAP_W);
    const bx = b % MAP_W, by = Math.floor(b / MAP_W);
    if (Math.max(Math.abs(ax - bx), Math.abs(ay - by)) !== 1) return false;
    ensureRoadLinkSet(a).add(b);
    ensureRoadLinkSet(b).add(a);
    connCache[a] = countConnections(ax, ay);
    connCache[b] = countConnections(bx, by);
    return true;
  }
  function removeRoadLinks(i) {
    const set = roadLinks.get(i);
    if (set) {
      for (const n of set) {
        const ns = roadLinks.get(n);
        if (ns) {
          ns.delete(i);
          const p = xy(n);
          connCache[n] = countConnections(p.x, p.y);
          if (!ns.size) roadLinks.delete(n);
        }
      }
    }
    roadLinks.delete(i);
    connCache[i] = 0;
  }
  function linkedNeighbors(i) {
    const set = roadLinks.get(i);
    if (!set) return [];
    return [...set].filter(n => road[n]);
  }
  function linkRoadCellsInOrder(cells) {
    for (let k = 1; k < cells.length; k++) addRoadLink(cells[k - 1], cells[k]);
    pathCache.clear();
    roadVersion++;
  }

  function vehicleLanePosition(v, cellIdx) {
    const dirKey = vehicleDirKeyForDraw(v);
    const buckets = laneBucketMap(cellIdx, false);
    const set = buckets && buckets.get(dirKey);
    const perDir = lanesPerDirectionAt(cellIdx);
    if (!set) return Math.abs(v.id) % perDir;
    const arr = [...set].sort((a,b) => a - b);
    const pos = arr.indexOf(v.id);
    return pos >= 0 ? pos % perDir : Math.abs(v.id) % perDir;
  }
  function vehicleGridSlot(v, cellIdx) {
    const dirKey = vehicleDirKeyForDraw(v);
    const buckets = laneBucketMap(cellIdx, false);
    const set = buckets && buckets.get(dirKey);
    const perDir = lanesPerDirectionAt(cellIdx);
    if (!set) return Math.floor((Math.abs(v.id) % Math.max(1, directionCapacityAt(cellIdx))) / perDir);
    const arr = [...set].sort((a,b) => a - b);
    const pos = arr.indexOf(v.id);
    return pos >= 0 ? Math.floor(pos / perDir) : 0;
  }
  function vehicleDirKeyForDraw(v) {
    if (v.nextIdx != null) return moveDirKey(v.currentIdx, v.nextIdx);
    if (v.pathPos + 1 < v.path.length) return moveDirKey(v.currentIdx, v.path[v.pathPos + 1]);
    if (v.pathPos > 0) return moveDirKey(v.path[v.pathPos - 1], v.currentIdx);
    return 'idle';
  }
  function vehicleLaneOffset(v, cellIdx, roadW) {
    const totalLanes = Math.max(2, roadLaneCountAt(cellIdx));
    const perDir = Math.max(1, Math.floor(totalLanes / 2));
    const pos = vehicleLanePosition(v, cellIdx);
    // ถนนแบ่งครึ่งตามทิศทางจริง: 2 เลน = 1 ไป/1 สวน, 4 = 2/2, 8 = 4/4
    // offset บวกคือฝั่งซ้ายของทิศทางรถ จึงไม่กินเลนสวน
    const laneWidth = roadW / totalLanes;
    return laneWidth * (Math.min(pos, perDir - 1) + 0.5);
  }

  function setStatus(msg) { statusText.textContent = msg; }
  function addAlert(title, detail, count = 1, kind = 'bad') {
    const key = `${title}|${detail}`;

  function addGate(data) {
    const gate = { id: gates.length + 1, ...data, entrance: null, inToday: 0, outToday: 0, passToday: 0 };
    gates.push(gate);
    return gate;
  }

  function isGateCell(x, y) {
    return gates.find(g => Math.abs(g.x - x) <= 1 && Math.abs(g.y - y) <= 1);
  }

  function updateGateEntrances() {
    for (const g of gates) {
      let best = null;
      let bestD = Infinity;
      for (let dy = -4; dy <= 4; dy++) for (let dx = -4; dx <= 4; dx++) {
        const x = g.x + dx, y = g.y + dy;
        if (!inBounds(x, y)) continue;
        const i = idx(x, y);
        if (!road[i]) continue;
        const d = Math.abs(dx) + Math.abs(dy);
        if (d < bestD) { bestD = d; best = i; }
      }
      g.entrance = best;
    }
  }

  function recomputeConnectionsAround(x, y, radius = 2) {
    for (let yy = y - radius; yy <= y + radius; yy++) for (let xx = x - radius; xx <= x + radius; xx++) {
      if (!inBounds(xx, yy)) continue;
      const i = idx(xx, yy);
      connCache[i] = countConnections(xx, yy);
    }
  }
  function countConnections(x, y, roadsOverride = null) {
    const i = idx(x, y);
    const hasRoad = roadsOverride ? roadsOverride.has(i) || road[i] : road[i];
    if (!hasRoad) return 0;
    if (!roadsOverride) return linkedNeighbors(i).length;
    // During preview/checking, count possible branches conservatively so junctions stay <= 4 ways.
    let c = 0;
    for (const [dx, dy] of DIRS) {
      const nx = x + dx, ny = y + dy;
      if (!inBounds(nx, ny)) continue;
      const ni = idx(nx, ny);
      if (roadsOverride.has(ni) || road[ni]) c++;
    }
    return c;
  }

  function canAddRoadCells(cells) {
    const addSet = new Set(cells);
    const toCheck = new Set();
    for (const i of cells) {
      const {x, y} = xy(i);
      toCheck.add(i);
      for (const [dx, dy] of DIRS) {
        const nx = x + dx, ny = y + dy;
        if (inBounds(nx, ny)) toCheck.add(idx(nx, ny));
      }
    }
    for (const i of toCheck) {
      const p = xy(i);
      if (countConnections(p.x, p.y, addSet) > 4) return { ok: false, reason: 'ทางแยกเกิน 4 ขา' };
    }
    return { ok: true };
  }

  function placeRoadCell(x, y, roadKey = 'small', charge = true) {
    if (!inBounds(x, y)) return false;
    const i = idx(x, y);
    const rd = DATA.roads[roadKey];
    const old = road[i];
    const oldRd = roadDataById(old);
    if (old && old >= rd.id) return true;
    const deltaCost = oldRd ? Math.max(0, rd.cost - oldRd.cost) : rd.cost;
    if (charge && !canSpend(deltaCost)) return false;
    if (!old) game.roadCount++;
    road[i] = rd.id;
    if (charge) game.money -= deltaCost;
    recomputeConnectionsAround(x, y, 2);
    pathCache.clear();
    roadVersion++;
    updateGateEntrances();
    return true;
  }

  function removeRoadCell(x, y, charge = true) {
    if (!inBounds(x, y)) return false;
    const i = idx(x, y);
    if (!road[i]) return false;
    if (cellVehicleCount(i) > 0) return false;
    const oldRd = roadDataById(road[i]);
    const fee = oldRd.cost * 0.2;
    if (charge) game.money -= fee;
    removeRoadLinks(i);
    road[i] = 0;
    game.roadCount = Math.max(0, game.roadCount - 1);
    recomputeConnectionsAround(x, y, 2);
    pathCache.clear();
    roadVersion++;
    updateGateEntrances();
    return true;
  }

  function getLineCells(x0, y0, x1, y1) {
    if (!inBounds(x0, y0) || !inBounds(x1, y1)) return [];
    let dx = x1 - x0, dy = y1 - y0;
    if (dx === 0 && dy === 0) return [idx(x0, y0)];
    const adx = Math.abs(dx), ady = Math.abs(dy);
    let sx = sign(dx), sy = sign(dy);
    if (adx > ady * 2) sy = 0;
    else if (ady > adx * 2) sx = 0;
    else { sx = sign(dx); sy = sign(dy); }
    const steps = sy === 0 ? adx : sx === 0 ? ady : Math.max(adx, ady);
    const cells = [];
    let x = x0, y = y0;
    for (let s = 0; s <= steps; s++) {
      if (inBounds(x, y)) cells.push(idx(x, y));
      x += sx; y += sy;
    }
    return [...new Set(cells)];
  }

  function canSpend(cost) {
    if (game.money < 0) return false;
    return game.money - cost >= -10000;
  }

  function addBuilding(typeKey, x, y, charge = true) {
    const t = DATA.buildings[typeKey];
    const check = canPlaceBuilding(typeKey, x, y, charge);
    if (!check.ok) return check;
    if (charge) game.money -= t.cost;
    const b = {
      id: nextBuildingId++, typeKey, kind: t.kind, name: t.name,
      x, y, w: t.w, h: t.h,
      residents: 0, reservedResidents: 0,
      employees: 0, reservedService: 0, visitors: 0,
      workerIds: [], citizenIds: [],
      entrance: check.entrance,
      entryDirKey: check.entryDirKey,
      entrySideKey: check.entrySideKey,
      builtAt: game.worldMin,
      arrivals: 0, fails: 0, delayed: 0
    };
    buildings.push(b);
    for (let yy = y; yy < y + t.h; yy++) for (let xx = x; xx < x + t.w; xx++) buildGrid[idx(xx, yy)] = b.id;
    if (charge) setStatus(`วาง ${t.name} ราคา ${formatMoney(t.cost)} บาท`);
    assignJobs();
    return { ok: true, building: b };
  }

  function canPlaceBuilding(typeKey, x, y, checkMoney = true) {
    const t = DATA.buildings[typeKey];
    if (!t) return { ok:false, reason:'ไม่มีข้อมูลอาคาร' };
    if (x < 1 || y < 1 || x + t.w >= MAP_W - 1 || y + t.h >= MAP_H - 1) return { ok:false, reason:'พื้นที่เกินขอบแมป' };
    if (checkMoney && !canSpend(t.cost)) return { ok:false, reason:'เงินไม่พอ หรือเงินติดลบอยู่' };
    for (let yy = y; yy < y + t.h; yy++) for (let xx = x; xx < x + t.w; xx++) {
      const i = idx(xx, yy);
      if (road[i]) return { ok:false, reason:'พื้นที่ทับถนน' };
      if (buildGrid[i]) return { ok:false, reason:'พื้นที่ทับสิ่งก่อสร้าง' };
    }
    const access = findAdjacentRoadForRect(x, y, t.w, t.h);
    if (!access) return { ok:false, reason:'อาคารต้องติดถนนและมีทางเข้าออก' };
    return { ok:true, entrance: access.entrance, entryDirKey: access.entryDirKey, entrySideKey: access.entrySideKey };
  }

  function findAdjacentRoadForRect(x, y, w, h) {
    let best = null;
    let bestScore = Infinity;
    for (let yy = y - 1; yy <= y + h; yy++) for (let xx = x - 1; xx <= x + w; xx++) {
      if (!inBounds(xx, yy)) continue;
      const outside = xx < x || xx >= x + w || yy < y || yy >= y + h;
      if (!outside) continue;
      const i = idx(xx, yy);
      if (road[i]) {
        const dxToBuilding = (x + w / 2 - 0.5) - xx;
        const dyToBuilding = (y + h / 2 - 0.5) - yy;
        let sideX = 0, sideY = 0;
        if (Math.abs(dxToBuilding) >= Math.abs(dyToBuilding)) sideX = sign(dxToBuilding);
        else sideY = sign(dyToBuilding);
        if (!sideX && !sideY) sideY = 1;
        // รถไทยขับชิดซ้าย: อาคารจะรับรถจากเลนฝั่งที่ติดอาคารเท่านั้น
        // left-normal ของทิศทางวิ่ง (dx,dy) คือ (-dy,dx) จึงย้อนกลับเป็น dir=(sideY,-sideX)
        const entryDirKey = `${sideY},${-sideX}`;
        const entrySideKey = `${sideX},${sideY}`;
        const score = Math.abs(xx - (x + w / 2)) + Math.abs(yy - (y + h / 2));
        if (score < bestScore) { bestScore = score; best = { entrance: i, entryDirKey, entrySideKey }; }
      }
    }
    return best;
  }

  function buildingType(b) { return DATA.buildings[b.typeKey]; }

  function actualResidentsInBuilding(b) {
