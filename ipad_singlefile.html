      selectionEl.innerHTML = '<div class="inspector-title">🧹 รื้อถนน</div><div class="muted">ลากเส้นบนถนนที่ต้องการรื้อ ค่ารื้อถอน 20% ของราคาก่อสร้างเดิม</div>';
    }
  }

  function inspectAt(x, y) {
    if (!inBounds(x,y)) return;
    const vehicle = findVehicleNear(x, y);
    if (vehicle) { inspectVehicle(vehicle); return; }
    const gate = isGateCell(x, y);
    if (gate) { inspectGate(gate); return; }
    const bid = buildGrid[idx(x,y)];
    if (bid) { inspectBuilding(buildingById(bid)); return; }
    if (road[idx(x,y)]) { inspectRoad(x,y); return; }
    selectionEl.innerHTML = '<div class="inspector-title">พื้นที่ว่าง</div><div class="muted">เลือกเครื่องมือเพื่อสร้างถนนหรืออาคาร</div>';
  }

  function findVehicleNear(gx, gy) {
    for (const v of vehicles) {
      const p = xy(v.currentIdx);
      if (Math.abs(p.x - gx) <= 1 && Math.abs(p.y - gy) <= 1) return v;
    }
    return null;
  }
  function inspectVehicle(v) {
    const c = v.citizenId ? citizens.find(x => x.id === v.citizenId) : null;
    const dest = v.destBuildingId ? buildingById(v.destBuildingId) : null;
    selectionEl.innerHTML = `<div class="inspector-title">🚗 รถ #${v.id}</div>
      <div class="muted">${c ? `Citizen ${c.id} • นิสัย ${c.profile.trait}` : 'รถผ่านเมืองจาก Gate'}</div>
      <div class="metric-grid">
        ${toolMetric('Trip', v.type)}
        ${toolMetric('สถานะ', c ? c.state : 'ผ่านเมือง')}
        ${toolMetric('ปลายทาง', dest ? dest.name : v.targetGateId ? 'Gate ปลายทาง' : '-')}
        ${toolMetric('รอสะสม', `${Math.round(v.waitingGameMin)} นาทีเกม`)}
        ${toolMetric('ความสุข', c ? `${Math.round(c.satisfaction)}%` : '-')}
        ${toolMetric('Path เหลือ', `${Math.max(0, v.path.length - v.pathPos)} ช่อง`)}
      </div>`;
  }
  function inspectGate(g) {
    selectionEl.innerHTML = `<div class="inspector-title">🚪 ${g.name}</div>
      <div class="muted">${g.role}</div>
      <div class="metric-grid">
        ${toolMetric('สถานะ', g.entrance != null ? 'เชื่อมถนนแล้ว' : 'ยังไม่เชื่อม')}
        ${toolMetric('ย้ายเข้า/วันนี้', g.inToday)}
        ${toolMetric('ย้ายออก/วันนี้', g.outToday)}
        ${toolMetric('รถผ่านเมือง', g.passToday)}
      </div>
      <div class="muted" style="margin-top:8px">รถย้ายเข้าและรถผ่านเมืองอ้างอิงจาก Gate นี้จริง</div>`;
  }
  function inspectBuilding(b) {
    if (!b) return;
    const t = buildingType(b);
    selectionEl.innerHTML = `<div class="inspector-title">${toolIcon('building', t.key)} ${t.name} #${b.id}</div>
      <div class="muted">${t.desc}</div>
      <div class="metric-grid">
        ${toolMetric('ขนาด', `${t.w}x${t.h}`)}
        ${toolMetric('บำรุง', `${formatMoney(t.maintenance)}/วัน`)}
        ${toolMetric('คนอยู่จริง', `${actualResidentsInBuilding(b)}/${t.residents || 0}${b.reservedResidents ? ` (+กำลังย้ายเข้า ${b.reservedResidents})` : ''}`)}
        ${toolMetric('คนทำงาน', `${b.employees}/${t.jobs}`)}
        ${toolMetric('ผู้ใช้บริการ', `${b.visitors}/${t.service}${b.reservedService ? ` (+จอง ${b.reservedService})` : ''}`)}
        ${toolMetric('วันนี้', `ถึง ${b.arrivals} • ล่าช้า ${b.delayed || 0}`)}
      </div>
      <div class="muted" style="margin-top:8px">Entrance: ${xy(b.entrance).x}, ${xy(b.entrance).y} • เข้าอาคารจากถนนที่เชื่อมอยู่ (${b.entrySideKey || '-'}) • ถ้าฝั่งหลักติดบัค ระบบจะใช้ทางเชื่อมที่ใกล้สุด • อาคารนี้ถูกใช้โดย Trip/Capacity จริง</div>`;
  }
  function inspectRoad(x, y) {
    const i = idx(x,y);
    const r = roadDataById(road[i]);
    const ratio = getRoadRatio(i);
    const carsHere = cellVehicleCount(i);
    const types = {};
    for (const v of vehicles) if (v.currentIdx === i || v.nextIdx === i) types[v.type] = (types[v.type]||0) + 1;
    selectionEl.innerHTML = `<div class="inspector-title">🛣️ ถนน ${x}, ${y}</div>
      <div class="muted">${r.name} • ${r.lanes} เลน • ${connCache[i]>=3 ? 'ทางแยก 4 ขา/ไฟแดง' : 'ทางถนน'}</div>
      <div class="metric-grid">
        ${toolMetric('รถบนช่อง', `${carsHere}/${laneCapacityAt(i)} คัน`)}
        ${toolMetric('Capacity', `${r.capacity} คัน/ช่อง`)}
        ${toolMetric('ช่องรถจริง', `${laneCapacityAt(i)} คัน/กริด`)}
        ${toolMetric('Traffic Ratio', ratio.toFixed(2))}
        ${toolMetric('สถานะ', `<span style="color:${trafficColor(ratio)}">${roadStatus(ratio)}</span>`)}
        ${toolMetric('ทางเชื่อม', `${connCache[i]} ขา`)}
        ${toolMetric('ค่ารอ', waitLoad[i].toFixed(1))}
      </div>
      <div class="muted" style="margin-top:8px">Trip: ${Object.entries(types).map(([k,v])=>`${k} ${v}`).join(', ') || '-'} • เปิด Heatmap เพื่อดูเขียว/เหลือง/ส้ม/แดง/ดำ</div>`;
  }
  function roadStatus(r) { return r<=.6?'ไหลดี':r<=.9?'เริ่มหนาแน่น':r<=1.2?'ติด':r<=1.6?'ติดหนัก':'Gridlock'; }

  function pointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }
  function touchPoint(t) {
    const rect = canvas.getBoundingClientRect();
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  function touchMid(a, b) { return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 }; }
  function touchDist(a, b) { return Math.hypot(a.x-b.x, a.y-b.y); }

  canvas.addEventListener('mousemove', (e) => {
    const p = pointerPos(e);
    game.lastMouse = p;
    const g = screenToGrid(p.x, p.y);
    game.hover = inBounds(g.x, g.y) ? g : null;
    if (game.draggingPan) {
      const dx = p.x - game.mouseWorld.x;
      const dy = p.y - game.mouseWorld.y;
      if (Math.abs(dx) + Math.abs(dy) > 0) {
        game.pan.x += dx;
        game.pan.y += dy;
        if (Math.hypot(p.x - game.panStart.x, p.y - game.panStart.y) > 5) game.panMoved = true;
      }
      game.mouseWorld = p;
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    const p = pointerPos(e);
    // คอม: เลื่อนแมปด้วยคลิกขวาค้างแล้วลากเท่านั้น
    // คลิกซ้ายใช้เลือก/วาง/ตรวจสอบ เพื่อไม่ให้ลากแมปชนกับการสร้างถนนหรือวางอาคาร
    if (e.button === 2) {
      game.draggingPan = true;
      game.panMoved = false;
      game.panStart = p;
      game.mouseWorld = p;
      canvas.classList.add('dragging');
      e.preventDefault();
      return;
    }
  });

  window.addEventListener('mouseup', () => {
    if (game.draggingPan) {
      if (game.panMoved) game.suppressClickUntil = performance.now() + 250;
      game.draggingPan = false;
      game.panMoved = false;
      canvas.classList.remove('dragging');
    }
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  canvas.addEventListener('touchstart', (e) => {
    if (!e.touches.length) return;
    e.preventDefault();
    if (e.touches.length === 1) {
      const p = touchPoint(e.touches[0]);
      const g = screenToGrid(p.x, p.y);
      game.lastMouse = p;
      game.hover = inBounds(g.x, g.y) ? g : null;
      const tool = game.selectedTool;
      if (tool && (tool.type === 'road' || tool.type === 'demolishRoad')) {
        game.touchMode = 'buildLine';
        game.touchLast = p;
        game.touchBuildStart = game.hover;
        game.touchBuildCurrent = game.hover;
        game.roadStart = game.hover;
        game.panMoved = false;
        setStatus(tool.type === 'road' ? 'iPad: ลากนิ้วเพื่อวางถนน แล้วปล่อยนิ้วเพื่อสร้าง' : 'iPad: ลากนิ้วเพื่อเลือกรื้อถนน แล้วปล่อยนิ้วเพื่อรื้อ');
        canvas.classList.add('dragging');
        return;
      }
      if (tool && tool.type === 'building') {
        game.touchMode = 'buildTap';
        game.touchLast = p;
        game.touchBuildStart = game.hover;
        game.touchBuildCurrent = game.hover;
        game.panMoved = false;
        setStatus('iPad: แตะตำแหน่งบนแผนที่เพื่อวางอาคาร');
        return;
      }
      // iPad/มือถือ: 1 นิ้วใช้แตะตรวจสอบเท่านั้น ไม่ลากแมป
      // การเลื่อนแมปให้ใช้ 2 นิ้วลาก ส่วนจีบ 2 นิ้วยังใช้ซูมเหมือนเดิม
      game.touchMode = 'inspectTap';
      game.touchLast = p;
      game.touchStart = p;
      game.touchBuildCurrent = game.hover;
      game.panStart = p;
      game.panMoved = false;
      setStatus('iPad: แตะเพื่อดูข้อมูล • ใช้ 2 นิ้วลากเพื่อเลื่อนแมป / จีบเพื่อซูม');
    } else {
      const a = touchPoint(e.touches[0]);
      const b = touchPoint(e.touches[1]);
      game.touchMode = 'pinch';
      game.touchLast = touchMid(a, b);
      game.touchDist = touchDist(a, b);
      game.touchZoom = game.zoom;
      game.panMoved = true;
      game.roadStart = null;
      game.touchBuildStart = null;
      canvas.classList.add('dragging');
    }
  }, { passive:false });

  canvas.addEventListener('touchmove', (e) => {
    if (!game.touchMode) return;
    e.preventDefault();
    if ((game.touchMode === 'buildLine' || game.touchMode === 'buildTap') && e.touches.length === 1) {
      const p = touchPoint(e.touches[0]);
      game.touchLast = p;
      game.lastMouse = p;
      const g = screenToGrid(p.x, p.y);
      game.hover = inBounds(g.x, g.y) ? g : null;
      game.touchBuildCurrent = game.hover;
      return;
    }
    if ((game.touchMode === 'inspectTap' || game.touchMode === 'postGesture') && e.touches.length === 1) {
      const p = touchPoint(e.touches[0]);
      if (game.panStart && Math.hypot(p.x - game.panStart.x, p.y - game.panStart.y) > 8) game.panMoved = true;
      game.touchLast = p;
      game.lastMouse = p;
      const g = screenToGrid(p.x, p.y);
      game.hover = inBounds(g.x, g.y) ? g : null;
      game.touchBuildCurrent = game.hover;
      return;
    }
    if (e.touches.length >= 2) {
      const a = touchPoint(e.touches[0]);
      const b = touchPoint(e.touches[1]);
      const mid = touchMid(a, b);
      game.pan.x += mid.x - game.touchLast.x;
      game.pan.y += mid.y - game.touchLast.y;
      const before = screenToWorld(mid.x, mid.y);
      const factor = touchDist(a, b) / Math.max(1, game.touchDist || 1);
      game.zoom = clamp(game.touchZoom * factor, 0.22, 5.2);
      const after = screenToWorld(mid.x, mid.y);
      game.pan.x += (after.x - before.x) * TILE * game.zoom;
      game.pan.y += (after.y - before.y) * TILE * game.zoom;
      game.touchLast = mid;
      game.panMoved = true;
    }
  }, { passive:false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) {
      const mode = game.touchMode;
      const tool = game.selectedTool;
      if (mode === 'buildLine' && tool && game.touchBuildStart && game.touchBuildCurrent) {
        const start = game.touchBuildStart;
        const end = game.touchBuildCurrent;
        const cells = getLineCells(start.x, start.y, end.x, end.y);
        if (tool.type === 'road') {
          const valid = canAddRoadCells(cells);
          const cost = estimateRoadCost(cells, tool.key);
          if (!valid.ok) setStatus(`สร้างไม่ได้: ${valid.reason}`);
          else if (!canSpend(cost)) setStatus('สร้างไม่ได้: เงินไม่พอหรือกำลังติดลบ');
          else { placeRoadCells(cells, tool.key, true); setStatus(`สร้าง/อัปเกรดถนน ${cells.length} ช่อง ราคา ${formatMoney(cost)} บาท`); }
        } else if (tool.type === 'demolishRoad') {
          let removed = 0;
          for (const i of cells) { const p2 = xy(i); if (removeRoadCell(p2.x, p2.y, true)) removed++; }
          setStatus(`รื้อถนน ${removed} ช่อง`);
        }
        updateToolButtons();
        game.suppressClickUntil = performance.now() + 450;
      } else if (mode === 'buildTap' && tool && tool.type === 'building' && game.touchBuildCurrent) {
        const g = game.touchBuildCurrent;
        const res = addBuilding(tool.key, g.x, g.y, true);
        if (!res.ok) setStatus(`วางไม่ได้: ${res.reason}`);
        updateToolButtons();
        game.suppressClickUntil = performance.now() + 450;
      } else if (mode === 'inspectTap' && !game.panMoved && game.touchBuildCurrent) {
        const g = game.touchBuildCurrent;
        inspectAt(g.x, g.y);
        game.suppressClickUntil = performance.now() + 450;
      } else if (game.panMoved || mode === 'postGesture' || mode === 'pinch') {
        game.suppressClickUntil = performance.now() + 350;
      }
      game.touchMode = null;
      game.touchLast = null;
      game.touchBuildStart = null;
      game.touchBuildCurrent = null;
      game.roadStart = null;
      game.panMoved = false;
      canvas.classList.remove('dragging');
    } else if (e.touches.length === 1) {
      // หลังปล่อยจาก gesture 2 นิ้ว ไม่ให้กลายเป็นลากแมปด้วยนิ้วเดียวต่อ
      const p = touchPoint(e.touches[0]);
      game.touchMode = 'postGesture';
      game.touchLast = p;
      game.panStart = p;
      game.panMoved = true;
      game.roadStart = null;
      game.touchBuildStart = null;
      game.touchBuildCurrent = null;
    }
  }, { passive:false });



  canvas.addEventListener('touchcancel', () => {
    game.touchMode = null;
    game.touchLast = null;
    game.touchBuildStart = null;
    game.touchBuildCurrent = null;
    game.roadStart = null;
    game.panMoved = false;
    canvas.classList.remove('dragging');
    setStatus('iPad: การแตะถูกยกเลิก ลองแตะ/ลากใหม่อีกครั้ง');
  }, { passive:false });

  canvas.addEventListener('click', (e) => {
    if (performance.now() < game.suppressClickUntil) return;
    if (e.button !== 0) return;
    const p = pointerPos(e);
    const g = screenToGrid(p.x, p.y);
    if (!inBounds(g.x,g.y)) return;
    const tool = game.selectedTool;
    if (!tool) { inspectAt(g.x, g.y); return; }
    if (tool.type === 'road') {
      if (!game.roadStart) { game.roadStart = g; setStatus('เลือกจุดปลายของถนน'); return; }
      const cells = getLineCells(game.roadStart.x, game.roadStart.y, g.x, g.y);
      const valid = canAddRoadCells(cells);
      const cost = estimateRoadCost(cells, tool.key);
      if (!valid.ok) { setStatus(`สร้างไม่ได้: ${valid.reason}`); game.roadStart = null; return; }
      if (!canSpend(cost)) { setStatus('สร้างไม่ได้: เงินไม่พอหรือกำลังติดลบ'); game.roadStart = null; return; }
      placeRoadCells(cells, tool.key, true);
      setStatus(`สร้าง/อัปเกรดถนน ${cells.length} ช่อง ราคา ${formatMoney(cost)} บาท`);
      game.roadStart = null;
      updateToolButtons();
    } else if (tool.type === 'demolishRoad') {
      if (!game.roadStart) { game.roadStart = g; setStatus('เลือกจุดปลายของเส้นถนนที่จะรื้อ'); return; }
      const cells = getLineCells(game.roadStart.x, game.roadStart.y, g.x, g.y);
      let removed = 0;
      for (const i of cells) { const p2 = xy(i); if (removeRoadCell(p2.x, p2.y, true)) removed++; }
      setStatus(`รื้อถนน ${removed} ช่อง`);
      game.roadStart = null;
    } else if (tool.type === 'building') {
      const res = addBuilding(tool.key, g.x, g.y, true);
      if (!res.ok) setStatus(`วางไม่ได้: ${res.reason}`);
      updateToolButtons();
    }
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const p = pointerPos(e);
    const before = screenToWorld(p.x, p.y);
    const factor = e.deltaY < 0 ? 1.12 : 0.89;
    game.zoom = clamp(game.zoom * factor, 0.22, 5.2);
    const after = screenToWorld(p.x, p.y);
    game.pan.x += (after.x - before.x) * TILE * game.zoom;
    game.pan.y += (after.y - before.y) * TILE * game.zoom;
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { game.selectedTool = null; game.roadStart = null; updateToolButtons(); showToolInfo(); }
    if (e.key === 'r' || e.key === 'R') { game.selectedTool = {type:'road', key:'small'}; updateToolButtons(); showToolInfo(); }
    if (e.key === 't' || e.key === 'T') { game.selectedTool = {type:'road', key:'medium'}; updateToolButtons(); showToolInfo(); }
    if (e.key === 'y' || e.key === 'Y') { game.selectedTool = {type:'road', key:'large'}; updateToolButtons(); showToolInfo(); }
    const step = 35;
    if (e.key === 'ArrowLeft' || e.key === 'a') game.pan.x += step;
    if (e.key === 'ArrowRight' || e.key === 'd') game.pan.x -= step;
    if (e.key === 'ArrowUp' || e.key === 'w') game.pan.y += step;
    if (e.key === 'ArrowDown' || e.key === 's') game.pan.y -= step;
  });

  function setPanelCollapsed(el, collapsed) {
    if (!el) return;
    el.classList.toggle('collapsed', collapsed);
    const btn = el.querySelector(':scope > .collapse-btn');
    if (btn) btn.textContent = collapsed ? '+' : '−';
  }
  function handleCollapseButton(btn, e) {
    if (e) {
      e.preventDefault();
      e.stopPropagation();
    }
    btn._lastCollapseToggle = performance.now();
    const el = document.getElementById(btn.dataset.collapseTarget);
    setPanelCollapsed(el, !el.classList.contains('collapsed'));
  }
  document.querySelectorAll('.collapse-btn').forEach(btn => {
    if (window.PointerEvent) {
      btn.addEventListener('pointerup', (e) => handleCollapseButton(btn, e));
    } else {
      btn.addEventListener('touchend', (e) => handleCollapseButton(btn, e), { passive:false });
    }
    btn.addEventListener('click', (e) => {
      if (btn._lastCollapseToggle && performance.now() - btn._lastCollapseToggle < 450) {
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      handleCollapseButton(btn, e);
    });
  });
  const coarseUi = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
  const iPadLike = /iPad|iPhone|Android/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const touchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (coarseUi || iPadLike || touchDevice) {
    setPanelCollapsed(document.getElementById('leftPanel'), true);
    setPanelCollapsed(document.getElementById('rightPanel'), true);
  }



  // iPad Safari sometimes scrolls/zooms the page before canvas receives a 2-finger move.
  // Lock browser-level gestures on the game surface; panels/buttons still receive their own taps.
  function preventBrowserPanZoom(e) {
    const target = e.target;
    if (target && target.closest && target.closest('.panel')) return;
    if (e.cancelable) e.preventDefault();
  }
  ['gesturestart','gesturechange','gestureend'].forEach(type => {
    document.addEventListener(type, preventBrowserPanZoom, { passive:false });
  });
  document.addEventListener('touchmove', preventBrowserPanZoom, { passive:false });

  function panMap(dir, amount = 42) {
    // Same camera behavior as keyboard arrows: pressing left shows more left-side map.
    if (dir === 'left') game.pan.x += amount;
    else if (dir === 'right') game.pan.x -= amount;
    else if (dir === 'up') game.pan.y += amount;
    else if (dir === 'down') game.pan.y -= amount;
  }
  const mapJoy = document.getElementById('mapJoy');
  let joyTimer = null;
  function stopJoyPan() {
    if (joyTimer) clearInterval(joyTimer);
    joyTimer = null;
  }
  function startJoyPan(dir, e) {
    if (e) {
      e.preventDefault();
      e.stopPropagation();
    }
    stopJoyPan();
    panMap(dir, 50);
    joyTimer = setInterval(() => panMap(dir, 34), 45);
    setStatus('ใช้ปุ่มจอยเลื่อนแมปได้ • 1 นิ้วสร้าง/แตะ • 2 นิ้วลาก/ซูม');
  }
  if (mapJoy) {
    mapJoy.addEventListener('touchmove', (e) => { if (e.cancelable) e.preventDefault(); }, { passive:false });
    mapJoy.querySelectorAll('button[data-pan]').forEach(btn => {
      const dir = btn.dataset.pan;
      if (window.PointerEvent) btn.addEventListener('pointerdown', (e) => startJoyPan(dir, e));
      else {
        btn.addEventListener('touchstart', (e) => startJoyPan(dir, e), { passive:false });
        btn.addEventListener('mousedown', (e) => startJoyPan(dir, e));
      }
      btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); });
    });
    ['pointerup','pointercancel','mouseup','mouseleave','touchend','touchcancel','blur'].forEach(type => {
      window.addEventListener(type, stopJoyPan, { passive:false });
    });
  }

  document.querySelectorAll('.speedBtn').forEach(btn => btn.addEventListener('click', () => {
    game.speed = Number(btn.dataset.speed);
    game.skipMode = false;
    updateSpeedButtons();
  }));
  function updateSpeedButtons() {
    document.querySelectorAll('.speedBtn').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.speed) === game.speed && !game.skipMode));
  }
  document.getElementById('skipBtn').addEventListener('click', () => {
    const target = absAt(absDay() + 1, 6*60);
    game.speed = 25;
    game.skipMode = true;
    addAlert('กำลังข้ามวัน', `ประมวลผล Simulation Summary ไปยัง ${DAY_NAMES[(absDay()+1)%7]} 06:00`, 1, 'good');
    // guard: if player clicks at early morning, still use high-speed forward simulation with rendering throttled normally
    if (game.worldMin > target) game.worldMin = target - 10;
    updateSpeedButtons();
  });
  heatBtn.addEventListener('click', () => { game.heatmap = !game.heatmap; heatBtn.textContent = `🌡 Heatmap: ${game.heatmap ? 'เปิด' : 'ปิด'}`; });
  debugBtn.addEventListener('click', () => { game.debug = !game.debug; debugBtn.textContent = `🧪 Debug: ${game.debug ? 'เปิด' : 'ปิด'}`; });
  document.getElementById('resetBtn').addEventListener('click', () => resetCity(citySelect.value));
  citySelect.addEventListener('change', () => resetCity(citySelect.value));

  let last = performance.now();
  let uiTick = 0;
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    update(dt);
    draw();
    uiTick += dt;
    if (uiTick > 0.33) {
      uiTick = 0;
      renderStats();
      renderAlerts();
      updateToolButtons();
      const s = computeStats();
      statusText.textContent = `${timeText()} • รถ ${s.activeTrips} • ถนน ${game.roadCount} ช่อง • Heatmap ${game.heatmap?'ON':'OFF'} • Debug ${game.debug?'ON':'OFF'}`;
    }
    requestAnimationFrame(loop);
  }

  buildToolButtons();
  resetCity('phuket');
  showToolInfo();
  requestAnimationFrame(loop);
})();

</script>
</body>
</html>
